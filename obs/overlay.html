<html>

<style>

  #chat-box {

    line-height: 1.5;
  }
</style>
</head>
<body>
<div id="chat-box">
  <div id="name">가온</div>
  <div id="message">아데0033, 너 진짜 공부 벌레냐? LLM은 방대한 데이터를 학습해서 사람처럼 자연스럽게 대화할 수 있게 만든 인공지능 모델을 말하는 거야! 🙄</div>
</div>
</body>
</html>
